datasources:
  datasource: 
    name: sample_data
    type: csv
    columns:
      - name: date 
        type: date
      - name: channel
        type: string
      - name: device
        type: string
      - name: visitors
        type: integer
      - name: orders
        type: integer
      - name: revenue
        type: integer
      - name: avg_order_value
        type: integer 
      - name: conversion_rate
        type: float
  datasource: 
    name: users
    type: json
    columns:
      - name: name 
        type: string
      - name: age
        type: integer
      - name: city
        type: string

