dashboard: 
  title: Sales Overview
  layout:
    columns: 2

  charts:
    - name: revenue_over_time
      type: line
      datasource: sales
      x: date
      y: revenue
      options: 
        title: Revenue Over Time
        template: plotly_white

    - name: orders_by_channel 
      type: bar
      datasource: sales
      x: channel 
      y: orders

      transform: 
        groupby: channel
        metrics:
          orders: sum

    - name: channels
      type: pie
      datasource: sales
      values: revenue
      names: channel

    - name: user_age
      type: pie
      datasource: users
      values: age
      names: name

    - name: users_by_team
      type: bar
      datasource: sample_data
      x: team
      y: name

      transform:
        groupby: team
        metrics:
          name: count

